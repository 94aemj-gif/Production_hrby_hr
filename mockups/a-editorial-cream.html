<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mockup A · Editorial Cream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f2;
  --bg-2:#f3eee5;
  --paper:#fffdf9;
  --ink:#1c1a17;
  --ink-2:#3d3a35;
  --muted:#8a8378;
  --line:#e6dfd2;
  --line-2:#d5cbb8;
  --accent:#5f7a5a;        /* muted sage */
  --accent-soft:#e9efe5;
  --warn:#b8794b;          /* clay */
  --warn-soft:#f6ece2;
  --danger:#a04848;
  --danger-soft:#f4e3e3;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100dvh}
.shell{display:grid;grid-template-columns:88px 1fr;min-height:100dvh}
.side{border-right:1px solid var(--line);background:var(--bg);padding:24px 14px;display:flex;flex-direction:column;gap:6px;align-items:center}
.side .brand{font-family:'Fraunces',serif;font-size:22px;font-weight:500;letter-spacing:-0.02em;color:var(--ink);margin-bottom:24px}
.nav{display:flex;flex-direction:column;gap:4px;width:100%}
.nav button{font-family:inherit;background:transparent;border:none;color:var(--muted);padding:14px 0;border-radius:12px;cursor:pointer;font-size:13px;letter-spacing:0.04em;text-transform:lowercase}
.nav button.active{background:var(--paper);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
.main{padding:48px 64px 80px;max-width:1280px;width:100%;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:40px}
.shift{display:flex;align-items:baseline;gap:14px}
.shift .label{font-family:'Fraunces',serif;font-size:28px;font-weight:400;letter-spacing:-0.02em}
.pill{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);padding:3px 10px;border-radius:999px;background:var(--accent-soft);font-weight:600}
.topright{display:flex;gap:18px;align-items:baseline;color:var(--muted);font-size:14px}
.topright .clock{font-family:'Fraunces',serif;font-size:18px;color:var(--ink)}
.topright .admin{color:var(--muted);border-bottom:1px solid var(--line-2);padding-bottom:1px;text-decoration:none;font-size:13px}
.eyebrow{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:18px}
.hero{text-align:center;padding:64px 24px 56px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:48px;background:linear-gradient(180deg,transparent,rgba(95,122,90,0.04))}
.counter{font-family:'Fraunces',serif;font-size:clamp(120px,18vw,240px);font-weight:300;line-height:0.9;letter-spacing:-0.06em;color:var(--ink);font-variant-numeric:tabular-nums}
.units{font-family:'Fraunces',serif;font-style:italic;color:var(--muted);font-size:18px;margin-top:10px;font-weight:300}
.cap{margin-top:42px;display:inline-flex;align-items:center;gap:14px;background:var(--ink);color:var(--bg);padding:18px 48px;border-radius:999px;font-size:14px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;border:none;cursor:pointer;font-family:inherit;box-shadow:0 12px 32px -16px rgba(28,26,23,0.5)}
.cap .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:40px}
.cell{padding:32px 28px;border-right:1px solid var(--line);text-align:left}
.cell:last-child{border-right:none}
.cell .k{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:500}
.cell .v{font-family:'Fraunces',serif;font-size:56px;font-weight:300;letter-spacing:-0.03em;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
.cell .s{font-size:12px;color:var(--muted);margin-top:6px;font-style:italic;font-family:'Fraunces',serif}
.hour{display:flex;flex-direction:column;gap:14px;padding:0 4px}
.hour-head{display:flex;justify-content:space-between;align-items:baseline}
.hour-head .h{font-family:'Fraunces',serif;font-size:18px;font-weight:400;letter-spacing:-0.01em}
.hour-head .left{font-size:13px;color:var(--accent);font-weight:500}
.bar{height:6px;background:var(--line);border-radius:999px;overflow:hidden;position:relative}
.bar > i{display:block;height:100%;width:62%;background:var(--accent);border-radius:999px}
.legend{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-style:italic;font-family:'Fraunces',serif}
@media (max-width:880px){.shell{grid-template-columns:1fr}.side{flex-direction:row;border-right:none;border-bottom:1px solid var(--line);padding:14px 24px}.side .brand{margin-bottom:0;margin-right:auto}.nav{flex-direction:row;width:auto;gap:4px}.main{padding:24px 20px 60px}.row{grid-template-columns:1fr}.cell{border-right:none;border-bottom:1px solid var(--line)}.cell:last-child{border-bottom:none}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand">pc.</div>
    <nav class="nav">
      <button class="active">captura</button>
      <button>gráficas</button>
    </nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="shift"><span class="label">Turno Matutino</span><span class="pill">activo</span></div>
      <div class="topright"><span>miércoles, 17 de mayo</span><span class="clock">10 : 42</span><a class="admin" href="#">Admin</a></div>
    </div>

    <div class="eyebrow">Producción del turno · piezas</div>
    <section class="hero">
      <div class="counter">482</div>
      <div class="units">de 720 piezas previstas</div>
      <button class="cap"><span class="dot"></span>Capturar producción</button>
    </section>

    <div class="row">
      <div class="cell"><div class="k">Última hora</div><div class="v">62</div><div class="s">+4 sobre meta</div></div>
      <div class="cell"><div class="k">Meta por hora</div><div class="v">60</div><div class="s">basada en turno</div></div>
      <div class="cell"><div class="k">Rechazos del turno</div><div class="v">3</div><div class="s">0.6% del total</div></div>
    </div>

    <div class="hour">
      <div class="hour-head"><div class="h">Hora 10:00 → 10:59</div><div class="left">18 min restantes</div></div>
      <div class="bar"><i></i></div>
      <div class="legend"><span>37 piezas capturadas</span><span>62% de la meta</span></div>
    </div>
  </main>
</div>
</body>
</html>
