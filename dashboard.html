<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="page.title.dashboard">Tablero</title>
  <meta name="theme-color" content="#f5f7fb" />
  <link rel="stylesheet" href="styles.css?v=78" />
</head>
<body class="dashboard-body app-shell">
  <header class="topbar">
    <div class="shift-info">
      <a class="back-btn" href="index.html" aria-label="Volver a Captura">&larr;</a>
      <h1 class="dashboard-title" data-i18n="dashboard.title">Tablero</h1>
      <span id="dashboard-date" class="muted"></span>
    </div>
    <div class="topbar-right">
      <button type="button" id="sync-status" class="sync-status sync-off" title="">—</button>
      <button type="button" id="lang-toggle" class="lang-toggle" title="English">EN</button>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="page-head dashboard-head">
      <div>
        <h1 class="page-title dashboard-page-title">Tablero de Producción</h1>
        <div class="page-meta">
          <span class="live-dot"></span>
          <span><span id="dashboard-lines-count">—</span> líneas configuradas · Actualizado en tiempo real</span>
        </div>
      </div>
      <div class="page-actions">
        <button type="button" class="action-btn" id="dashboard-date-btn">Hoy</button>
        <button type="button" class="action-btn primary" id="dashboard-export-btn">Exportar</button>
      </div>
    </div>

    <section class="dashboard-summary" id="dashboard-summary">
      <div class="ds-tile">
        <div class="ds-label" data-i18n="dashboard.totalProduction">Producción total</div>
        <div class="ds-body">
          <span id="ds-total-good" class="ds-value">0</span>
          <span class="ds-unit">piezas</span>
        </div>
      </div>
      <div class="ds-tile">
        <div class="ds-label" data-i18n="dashboard.totalScrap">Rechazos</div>
        <div class="ds-body">
          <span id="ds-total-scrap" class="ds-value">0</span>
          <span class="ds-unit">piezas</span>
        </div>
      </div>
      <div class="ds-tile">
        <div class="ds-label" data-i18n="dashboard.linesActive">Líneas activas</div>
        <div class="ds-body">
          <span id="ds-active-lines" class="ds-value">0 / 0</span>
        </div>
      </div>
      <div class="ds-tile">
        <div class="ds-label" data-i18n="dashboard.avgPace">Ritmo promedio</div>
        <div class="ds-body">
          <span id="ds-avg-pace" class="ds-value">—</span>
        </div>
      </div>
    </section>

    <div class="lines-head">
      <span class="lines-title">Estado por línea</span>
      <div class="lines-filter" role="tablist">
        <button type="button" class="filter-chip active" data-filter="all">Todas</button>
        <button type="button" class="filter-chip" data-filter="active">Activas</button>
        <button type="button" class="filter-chip" data-filter="idle">En paro</button>
      </div>
    </div>

    <div id="dashboard-grid" class="dashboard-grid"></div>
    <div id="dashboard-empty" class="dashboard-empty muted hidden" data-i18n="dashboard.empty">
      Aún no hay líneas configuradas.
    </div>
  </main>

  <!-- Mobile/tablet bottom tab bar (CSS-shown <=1024px) -->
  <nav class="bottom-tabbar" id="bottom-tabbar" aria-label="Navegación principal">
    <a class="nav-item bottab-item" href="index.html">
      <span class="bottab-ic" aria-hidden="true">⊕</span>
      <span class="bottab-label" data-i18n="nav.capture">Captura</span>
    </a>
    <a class="nav-item bottab-item" href="index.html#charts">
      <span class="bottab-ic" aria-hidden="true">▤</span>
      <span class="bottab-label" data-i18n="nav.charts">Gráficas</span>
    </a>
    <a class="nav-item bottab-item active" href="dashboard.html" aria-current="page">
      <span class="bottab-ic" aria-hidden="true">▦</span>
      <span class="bottab-label" data-i18n="nav.dashboard">Tablero</span>
    </a>
    <a class="nav-item bottab-item" href="admin.html">
      <span class="bottab-ic" aria-hidden="true">⚙</span>
      <span class="bottab-label" data-i18n="top.admin">Admin</span>
    </a>
  </nav>

  <script src="i18n.js?v=78"></script>
  <script src="supabase-config.js?v=78"></script>
  <script src="sync.js?v=78"></script>
  <script src="app.js?v=78"></script>
  <script src="dashboard.js?v=78"></script>
</body>
</html>
