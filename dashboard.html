<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="page.title.dashboard">Tablero</title>
  <meta name="theme-color" content="#f5f7fb" />
  <link rel="stylesheet" href="styles.css?v=48" />
</head>
<body class="dashboard-body">
  <header class="topbar">
    <div class="shift-info">
      <span class="dashboard-title" data-i18n="dashboard.title">Tablero</span>
      <span id="dashboard-date" class="muted"></span>
    </div>
    <div class="topbar-right">
      <button type="button" id="sync-status" class="sync-status sync-off" title="">—</button>
      <button type="button" id="lang-toggle" class="lang-toggle" title="English">EN</button>
      <a class="admin-link" href="index.html" data-i18n="dashboard.nav.capture">Captura</a>
      <a class="admin-link" href="admin.html" data-i18n="top.admin">Admin</a>
    </div>
  </header>

  <main class="dashboard-main">
    <section class="dashboard-summary" id="dashboard-summary">
      <div class="ds-tile">
        <div class="ds-label" data-i18n="dashboard.totalProduction">Producción total</div>
        <div id="ds-total-good" class="ds-value">0</div>
      </div>
      <div class="ds-tile">
        <div class="ds-label" data-i18n="dashboard.totalScrap">Rechazos</div>
        <div id="ds-total-scrap" class="ds-value">0</div>
      </div>
      <div class="ds-tile">
        <div class="ds-label" data-i18n="dashboard.linesActive">Líneas activas</div>
        <div id="ds-active-lines" class="ds-value">0 / 0</div>
      </div>
      <div class="ds-tile">
        <div class="ds-label" data-i18n="dashboard.avgPace">Ritmo promedio</div>
        <div id="ds-avg-pace" class="ds-value">—</div>
      </div>
    </section>

    <div id="dashboard-grid" class="dashboard-grid"></div>
    <div id="dashboard-empty" class="dashboard-empty muted hidden" data-i18n="dashboard.empty">
      Aún no hay líneas configuradas.
    </div>
  </main>

  <script src="i18n.js?v=48"></script>
  <script src="supabase-config.js?v=48"></script>
  <script src="sync.js?v=48"></script>
  <script src="app.js?v=48"></script>
  <script src="dashboard.js?v=48"></script>
</body>
</html>
